<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Prompt Blocks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🧠 Prompt Blocks</h1>
  <p>Build a prompt to generate quiz questions about mitosis.</p>

  <div class="container">

    <div class="blocks">
      <div class="block" draggable="true">You are a college biology instructor</div>
      <div class="block" draggable="true">Generate 3 multiple-choice questions</div>
      <div class="block" draggable="true">For first-year undergraduates</div>
      <div class="block" draggable="true">Include answer key</div>
      <div class="block" draggable="true">Format as a table</div>
    </div>

    <div class="drop-zone" id="dropZone">
      <p>Drag blocks here to build your prompt</p>
    </div>

  </div>

  <button onclick="checkPrompt()">Check Prompt</button>
  <button onclick="resetPrompt()">Reset</button>
  <button onclick="nextLevel()">Next Level</button>
  
  <p id="feedback"></p>
  
  <div class="meter-container">
  <div id="strengthMeter"></div>
</div>

<script src="script.js"></script>
</body>
</html>
